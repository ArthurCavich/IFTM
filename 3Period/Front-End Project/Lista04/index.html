<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>BuscaFlix - Buscador de filmes no TMDB</title>
</head>

<body>
    <header>
        <div class="header-container">
            <span class="logo-texto">BuscaFlix</span>
            <span class="separador">|</span>
            <span class="subtitulo">Buscador de Filmes</span>
        </div>
    </header>

    <main>
        <h1>Os Mais Populares</h1>
        
        <div class="container-filmes">
            <div id="filmes" class="grid-filmes"></div>
        </div>

        <div class="container-botao">
            <button id="btn-carregar" class="btn-primary">Carregar +10 filmes</button>
            <button id="btn-topo" class="btn-secundario" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Voltar ao início">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
            </button>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-esq">
                <!-- link do meu github -->
                <div class="perfil-github">
                    <span class="nome-autor">Arthur Santana Cavichioli</span>
                    <a href="https://github.com/ArthurCavich" target="_blank" rel="noopener noreferrer">
                        <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub" width="24" height="24">
                    </a>
                </div>
                <p>2026 - Projeto de desenvolvimento acadêmico.</p>
            </div>
            
            <div class="footer-dir">
                <!-- link do tmdb -->
                <a href="https://www.themoviedb.org" target="_blank" rel="noopener noreferrer">
                    <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_short-8e7b30f73a4020692ccca9c88bafe5dcb6f8a62a4c6bc55cd9ba82bb2cd95f6c.svg"
                        alt="TMDB Logo" width="154">
                </a>
                <p>Todo conteúdo é proveniente da API do The Movie DB.</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>

</html>
